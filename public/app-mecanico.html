<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PCM Mecânico - Manutenção Industrial</title>
  <meta name="description" content="Aplicativo do Mecânico - Ordens de Serviço, Execução e Solicitações" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PCM Mecânico" />
  <link rel="manifest" href="/manifest-mecanico.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1.5rem;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 360px;
    }
    .icon-box {
      width: 120px; height: 120px;
      border-radius: 28px;
      background: rgba(59,130,246,0.15);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(59,130,246,0.2);
    }
    .icon-box img { width: 80px; height: 80px; border-radius: 16px; }
    h1 { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.02em; }
    .subtitle { font-size: 1rem; opacity: 0.7; line-height: 1.5; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem;
      width: 100%; padding: 1.25rem 2rem;
      background: #3b82f6; color: #fff;
      font-size: 1.125rem; font-weight: 800;
      border: none; border-radius: 1rem; cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 24px; height: 24px; }
    .footer { font-size: 0.75rem; opacity: 0.4; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-box">
      <img src="/icons/icon-192x192.png" alt="PCM Mecânico" />
    </div>
    <div>
      <h1>PCM Mecânico</h1>
      <p class="subtitle">Sistema de Manutenção Industrial<br/>Ordens de Serviço &bull; Execução &bull; Solicitações</p>
    </div>
    <a href="/mecanico" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
      ACESSAR PAINEL
    </a>
    <p class="footer">GPPIS Industrial Systems &copy; 2026</p>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
