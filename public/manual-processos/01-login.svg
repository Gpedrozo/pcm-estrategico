<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420"><rect width="1200" height="420" fill="#f8fafc"/><text x="32" y="44" font-size="28" font-family="Arial" font-weight="700" fill="#0f172a">01 - Login no Sistema</text><rect x="32" y="90" width="260" height="120" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="50" y="130" font-size="16" font-family="Arial" fill="#0f172a">1. Abrir tela de login</text><text x="50" y="156" font-size="14" font-family="Arial" fill="#334155">Acessar URL do tenant</text><rect x="332" y="90" width="260" height="120" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="350" y="130" font-size="16" font-family="Arial" fill="#0f172a">2. Inserir email e senha</text><text x="350" y="156" font-size="14" font-family="Arial" fill="#334155">Validar credenciais</text><rect x="632" y="90" width="260" height="120" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="650" y="130" font-size="16" font-family="Arial" fill="#0f172a">3. Entrar no sistema</text><text x="650" y="156" font-size="14" font-family="Arial" fill="#334155">Conferir menu carregado</text><rect x="932" y="90" width="236" height="120" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="950" y="130" font-size="16" font-family="Arial" fill="#0f172a">4. Iniciar rotina</text><text x="950" y="156" font-size="14" font-family="Arial" fill="#334155">Dashboard e backlog</text></svg>