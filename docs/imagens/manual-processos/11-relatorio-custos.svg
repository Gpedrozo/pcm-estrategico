<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#faf5ff;stroke:#7e22ce;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#7e22ce;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7e22ce"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 11 - Analise de custos e relatorios</text><rect x="40" y="110" width="250" height="170" rx="12" class="b"/><text x="58" y="145" class="t">1. Abrir Custos</text><text x="58" y="175" class="d">Selecionar periodo</text><rect x="310" y="110" width="250" height="170" rx="12" class="b"/><text x="328" y="145" class="t">2. Ler composicao</text><text x="328" y="175" class="d">Mao de obra, material, terceiros</text><rect x="580" y="110" width="250" height="170" rx="12" class="b"/><text x="598" y="145" class="t">3. Ranking por TAG</text><text x="598" y="175" class="d">Identificar ativos cronicos</text><rect x="850" y="110" width="250" height="170" rx="12" class="b"/><text x="868" y="145" class="t">4. Cruza com KPIs</text><text x="868" y="175" class="d">MTBF, MTTR e disponibilidade</text><rect x="1120" y="110" width="250" height="170" rx="12" class="b"/><text x="1138" y="145" class="t">5. Emitir relatorio</text><text x="1138" y="175" class="d">Base para reuniao gerencial</text><line x1="290" y1="195" x2="310" y2="195" class="a"/><line x1="560" y1="195" x2="580" y2="195" class="a"/><line x1="830" y1="195" x2="850" y2="195" class="a"/><line x1="1100" y1="195" x2="1120" y2="195" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: composicao de custo por categoria e ranking de equipamentos.</text></svg>