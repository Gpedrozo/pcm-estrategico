<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#f8fafc;stroke:#0f766e;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#0f766e;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0f766e"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 10 - RCA (analise de causa raiz)</text><rect x="40" y="110" width="260" height="170" rx="12" class="b"/><text x="58" y="145" class="t">1. Abrir RCA</text><text x="58" y="175" class="d">Criar nova analise</text><rect x="320" y="110" width="260" height="170" rx="12" class="b"/><text x="338" y="145" class="t">2. Definir metodo</text><text x="338" y="175" class="d">5 porques / Ishikawa / Arvore</text><rect x="600" y="110" width="260" height="170" rx="12" class="b"/><text x="618" y="145" class="t">3. Descrever problema</text><text x="618" y="175" class="d">Falha, contexto e impacto</text><rect x="880" y="110" width="260" height="170" rx="12" class="b"/><text x="898" y="145" class="t">4. Identificar causa</text><text x="898" y="175" class="d">Causa raiz confirmada</text><rect x="1160" y="110" width="220" height="170" rx="12" class="b"/><text x="1178" y="145" class="t">5. Plano de acao</text><text x="1178" y="175" class="d">Acao e eficacia</text><line x1="300" y1="195" x2="320" y2="195" class="a"/><line x1="580" y1="195" x2="600" y2="195" class="a"/><line x1="860" y1="195" x2="880" y2="195" class="a"/><line x1="1140" y1="195" x2="1160" y2="195" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: RCA concluida com causa raiz, acao corretiva e status de eficacia.</text></svg>