<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#e11d48;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#e11d48"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 07 - Preditiva e alertas ativos</text><rect x="40" y="110" width="260" height="170" rx="12" class="b"/><text x="58" y="145" class="t">1. Registrar medicao</text><text x="58" y="175" class="d">TAG + tipo + valor</text><rect x="320" y="110" width="260" height="170" rx="12" class="b"/><text x="338" y="145" class="t">2. Aplicar limites</text><text x="338" y="175" class="d">Normal, alerta, critico</text><rect x="600" y="110" width="260" height="170" rx="12" class="b"/><text x="618" y="145" class="t">3. Classificar status</text><text x="618" y="175" class="d">Sistema classifica automaticamente</text><rect x="880" y="110" width="260" height="170" rx="12" class="b"/><text x="898" y="145" class="t">4. Tratar alertas</text><text x="898" y="175" class="d">Aba Alertas Ativos</text><rect x="1160" y="110" width="220" height="170" rx="12" class="b"/><text x="1178" y="145" class="t">5. Abrir acao</text><text x="1178" y="175" class="d">Emitir O.S / RCA</text><line x1="300" y1="195" x2="320" y2="195" class="a"/><line x1="580" y1="195" x2="600" y2="195" class="a"/><line x1="860" y1="195" x2="880" y2="195" class="a"/><line x1="1140" y1="195" x2="1160" y2="195" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: medicao classificada, alerta ativo e acao corretiva associada.</text></svg>