<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560"><defs><style>.title{font:700 28px Arial}.b{fill:#eff6ff;stroke:#1d4ed8;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#1d4ed8;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1d4ed8"/></marker></defs><rect width="1400" height="560" fill="#fff"/><text x="40" y="50" class="title">Processo 03 - Emissao de O.S</text><rect x="40" y="120" width="300" height="180" rx="12" class="b"/><text x="60" y="155" class="t">1. Menu Emitir O.S</text><text x="60" y="185" class="d">Abrir formulario de nova ordem</text><rect x="380" y="120" width="300" height="180" rx="12" class="b"/><text x="400" y="155" class="t">2. Definir TAG e tipo</text><text x="400" y="185" class="d">Corretiva/Preventiva/Preditiva...</text><rect x="720" y="120" width="300" height="180" rx="12" class="b"/><text x="740" y="155" class="t">3. Prioridade e solicitante</text><text x="740" y="185" class="d">Descrever problema com clareza</text><rect x="1060" y="120" width="300" height="180" rx="12" class="b"/><text x="1080" y="155" class="t">4. Salvar e imprimir</text><text x="1080" y="185" class="d">Emitir ficha para execucao</text><line x1="340" y1="210" x2="380" y2="210" class="a"/><line x1="680" y1="210" x2="720" y2="210" class="a"/><line x1="1020" y1="210" x2="1060" y2="210" class="a"/><text x="40" y="500" class="d">Evidencia de tela sugerida: O.S criada com numero, tipo, prioridade e TAG vinculada.</text></svg>