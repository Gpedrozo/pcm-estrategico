<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#f0fdf4;stroke:#16a34a;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#16a34a;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 04 - Fechamento de O.S</text><rect x="40" y="110" width="240" height="170" rx="12" class="b"/><text x="55" y="145" class="t">1. Selecionar O.S</text><text x="55" y="175" class="d">Escolher ordem em aberto</text><rect x="300" y="110" width="240" height="170" rx="12" class="b"/><text x="315" y="145" class="t">2. Apontar horas</text><text x="315" y="175" class="d">Inicio, fim e duracao</text><rect x="560" y="110" width="240" height="170" rx="12" class="b"/><text x="575" y="145" class="t">3. Registrar servico</text><text x="575" y="175" class="d">Descricao tecnica</text><rect x="820" y="110" width="240" height="170" rx="12" class="b"/><text x="835" y="145" class="t">4. Apontar materiais</text><text x="835" y="175" class="d">Quantidade e custo</text><rect x="1080" y="110" width="280" height="170" rx="12" class="b"/><text x="1095" y="145" class="t">5. Fechar e validar custos</text><text x="1095" y="175" class="d">Mao de obra, materiais, terceiros</text><rect x="980" y="340" width="380" height="170" rx="12" class="b"/><text x="1000" y="375" class="t">6. Corretiva: preencher RCA</text><text x="1000" y="405" class="d">Modo de falha, causa e acao</text><line x1="280" y1="195" x2="300" y2="195" class="a"/><line x1="540" y1="195" x2="560" y2="195" class="a"/><line x1="800" y1="195" x2="820" y2="195" class="a"/><line x1="1060" y1="195" x2="1080" y2="195" class="a"/><line x1="1230" y1="280" x2="1180" y2="340" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: 