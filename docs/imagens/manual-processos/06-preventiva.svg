<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#ecfeff;stroke:#0891b2;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#0891b2;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0891b2"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 06 - Plano preventivo</text><rect x="40" y="110" width="250" height="170" rx="12" class="b"/><text x="58" y="145" class="t">1. Criar plano</text><text x="58" y="175" class="d">TAG, frequencia e escopo</text><rect x="310" y="110" width="250" height="170" rx="12" class="b"/><text x="328" y="145" class="t">2. Definir atividades</text><text x="328" y="175" class="d">Checklist tecnico e tempo</text><rect x="580" y="110" width="250" height="170" rx="12" class="b"/><text x="598" y="145" class="t">3. Ativar plano</text><text x="598" y="175" class="d">Status ativo/inativo</text><rect x="850" y="110" width="250" height="170" rx="12" class="b"/><text x="868" y="145" class="t">4. Programar execucao</text><text x="868" y="175" class="d">Enviar para agenda</text><rect x="1120" y="110" width="250" height="170" rx="12" class="b"/><text x="1138" y="145" class="t">5. Registrar historico</text><text x="1138" y="175" class="d">Executado, atraso e aderencia</text><line x1="290" y1="195" x2="310" y2="195" class="a"/><line x1="560" y1="195" x2="580" y2="195" class="a"/><line x1="830" y1="195" x2="850" y2="195" class="a"/><line x1="1100" y1="195" x2="1120" y2="195" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: plano ativo com atividades cadastradas e ultima execucao registrada.</text></svg>