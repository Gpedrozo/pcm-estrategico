<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#0f172a}
      .step{fill:#f8fafc; stroke:#2563eb; stroke-width:2}
      .txt{font:600 16px Arial, sans-serif; fill:#0f172a}
      .sub{font:400 14px Arial, sans-serif; fill:#334155}
      .arrow{stroke:#2563eb; stroke-width:3; marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1400" height="560" fill="#ffffff"/>
  <text x="40" y="50" class="title">Processo 01 - Login e acesso ao tenant</text>
  <rect x="40" y="120" rx="12" ry="12" width="300" height="180" class="step"/>
  <text x="60" y="155" class="txt">1. Abrir tela de Login</text>
  <text x="60" y="185" class="sub">URL do tenant e ambiente correto</text>
  <text x="60" y="210" class="sub">(Owner e Tenant separados)</text>

  <rect x="380" y="120" rx="12" ry="12" width="300" height="180" class="step"/>
  <text x="400" y="155" class="txt">2. Informar credenciais</text>
  <text x="400" y="185" class="sub">Email + senha</text>
  <text x="400" y="210" class="sub">Verificar perfil de acesso</text>

  <rect x="720" y="120" rx="12" ry="12" width="300" height="180" class="step"/>
  <text x="740" y="155" class="txt">3. Validar menu lateral</text>
  <text x="740" y="185" class="sub">Dashboard + modulos permitidos</text>
  <text x="740" y="210" class="sub">Conferir restricoes de ADMIN</text>

  <rect x="1060" y="120" rx="12" ry="12" width="300" height="180" class="step"/>
  <text x="1080" y="155" class="txt">4. Iniciar rotina diaria</text>
  <text x="1080" y="185" class="sub">Dashboard -> Backlog -> Programacao</text>
  <text x="1080" y="210" class="sub">Registrar evidencias operacionais</text>

  <line x1="340" y1="210" x2="380" y2="210" class="arrow"/>
  <line x1="680" y1="210" x2="720" y2="210" class="arrow"/>
  <line x1="1020" y1="210" x2="1060" y2="210" class="arrow"/>

  <text x="40" y="500" class="sub">Evidencia de tela sugerida: Login preenchido, menu carregado e usuario autenticado.</text>
</svg>