<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560"><defs><style>.title{font:700 28px Arial}.b{fill:#fefce8;stroke:#ca8a04;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#ca8a04;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#ca8a04"/></marker></defs><rect width="1400" height="560" fill="#fff"/><text x="40" y="50" class="title">Processo 05 - Programacao semanal</text><rect x="40" y="120" width="300" height="180" rx="12" class="b"/><text x="60" y="155" class="t">1. Abrir Programacao</text><text x="60" y="185" class="d">Selecionar semana de trabalho</text><rect x="380" y="120" width="300" height="180" rx="12" class="b"/><text x="400" y="155" class="t">2. Priorizar backlog</text><text x="400" y="185" class="d">Urgencia, risco e recurso</text><rect x="720" y="120" width="300" height="180" rx="12" class="b"/><text x="740" y="155" class="t">3. Alocar atividades</text><text x="740" y="185" class="d">Preventiva, preditiva e corretiva</text><rect x="1060" y="120" width="300" height="180" rx="12" class="b"/><text x="1080" y="155" class="t">4. Emitir O.S do plano</text><text x="1080" y="185" class="d">Gerar execucao e ficha</text><line x1="340" y1="210" x2="380" y2="210" class="a"/><line x1="680" y1="210" x2="720" y2="210" class="a"/><line x1="1020" y1="210" x2="1060" y2="210" class="a"/><text x="40" y="500" class="d">Evidencia de tela sugerida: calendario da semana com OS planejadas e indicadores de vencidas/proximas.</text></svg>