<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><style>.title{font:700 28px Arial}.b{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#4f46e5;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#4f46e5"/></marker></defs><rect width="1400" height="620" fill="#fff"/><text x="40" y="50" class="title">Processo 09 - Permissao de Trabalho (PT)</text><rect x="40" y="110" width="250" height="170" rx="12" class="b"/><text x="58" y="145" class="t">1. Abrir aba PT</text><text x="58" y="175" class="d">Criar nova permissao</text><rect x="310" y="110" width="250" height="170" rx="12" class="b"/><text x="328" y="145" class="t">2. Definir tipo</text><text x="328" y="175" class="d">Altura, eletrica, quente...</text><rect x="580" y="110" width="250" height="170" rx="12" class="b"/><text x="598" y="145" class="t">3. Informar riscos</text><text x="598" y="175" class="d">Riscos e medidas de controle</text><rect x="850" y="110" width="250" height="170" rx="12" class="b"/><text x="868" y="145" class="t">4. Definir EPI e equipe</text><text x="868" y="175" class="d">Executante, supervisor, aprovador</text><rect x="1120" y="110" width="250" height="170" rx="12" class="b"/><text x="1138" y="145" class="t">5. Salvar PT</text><text x="1138" y="175" class="d">Periodo e status da liberacao</text><line x1="290" y1="195" x2="310" y2="195" class="a"/><line x1="560" y1="195" x2="580" y2="195" class="a"/><line x1="830" y1="195" x2="850" y2="195" class="a"/><line x1="1100" y1="195" x2="1120" y2="195" class="a"/><text x="40" y="585" class="d">Evidencia de tela sugerida: PT registrada com riscos, controles e EPIs requeridos.</text></svg>