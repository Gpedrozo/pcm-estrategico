<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560"><defs><style>.title{font:700 28px Arial}.b{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.t{font:600 16px Arial}.d{font:400 14px Arial}.a{stroke:#dc2626;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs><rect width="1400" height="560" fill="#fff"/><text x="40" y="50" class="title">Processo 08 - Registro de incidente SSMA</text><rect x="40" y="120" width="300" height="180" rx="12" class="b"/><text x="60" y="155" class="t">1. Abrir SSMA</text><text x="60" y="185" class="d">Aba Incidentes</text><rect x="380" y="120" width="300" height="180" rx="12" class="b"/><text x="400" y="155" class="t">2. Classificar evento</text><text x="400" y="185" class="d">Tipo e severidade</text><rect x="720" y="120" width="300" height="180" rx="12" class="b"/><text x="740" y="155" class="t">3. Registrar evidencias</text><text x="740" y="185" class="d">Local, envolvidos, acoes</text><rect x="1060" y="120" width="300" height="180" rx="12" class="b"/><text x="1080" y="155" class="t">4. Salvar e comunicar</text><text x="1080" y="185" class="d">Escalonar para gestor</text><line x1="340" y1="210" x2="380" y2="210" class="a"/><line x1="680" y1="210" x2="720" y2="210" class="a"/><line x1="1020" y1="210" x2="1060" y2="210" class="a"/><text x="40" y="500" class="d">Evidencia de tela sugerida: incidente salvo com severidade, causa imediata e acao imediata.</text></svg>