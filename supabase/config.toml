project_id = "dvwsferonoczgmvfubgu"

[auth]
enabled = true
site_url = "https://www.gppis.com.br"
additional_redirect_urls = ["https://owner.gppis.com.br", "https://owner.gppis.com.br/*", "https://www.gppis.com.br/*"]

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.hook.custom_access_token]
enabled = false

[functions.analisar-causa-raiz]
verify_jwt = false

[functions.owner-portal-admin]
verify_jwt = true

[functions.company-membership]
verify_jwt = true

[functions.maintenance-os-service]
verify_jwt = true

[functions.platform-metrics-rollup]
verify_jwt = true
