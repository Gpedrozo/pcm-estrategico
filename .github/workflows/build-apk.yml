name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'mecanico-app/**'
      - '.github/workflows/build-apk.yml'
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mecanico-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Debug info
        run: |
          node --version
          npm --version
          npx expo --version || true
          node -e "console.log(require('@expo/config-plugins/package.json').version)" || true
          cat app.json

      - name: Generate native project (expo prebuild)
        id: prebuild
        continue-on-error: true
        run: |
          npx expo prebuild --platform android --clean --no-install 2>&1 | tee prebuild-output.txt
          echo "PREBUILD_EXIT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"
        env:
          EXPO_NO_TELEMETRY: 1
          CI: "1"

      - name: Show prebuild result
        if: always()
        run: |
          echo "## Expo Prebuild Output" >> "$GITHUB_STEP_SUMMARY"
          echo "```" >> "$GITHUB_STEP_SUMMARY"
          cat prebuild-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output captured" >> "$GITHUB_STEP_SUMMARY"
          echo "```" >> "$GITHUB_STEP_SUMMARY"
          echo "=== Full prebuild output ==="
          cat prebuild-output.txt 2>/dev/null || echo "No output"
          echo "=== Exit code: $PREBUILD_EXIT ==="

      - name: Upload prebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-log
          path: mecanico-app/prebuild-output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if prebuild failed
        if: steps.prebuild.outcome != 'success'
        run: exit 1

      - name: Build APK (release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/pcm-mecanico.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcm-mecanico-apk
          path: mecanico-app/output/pcm-mecanico.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: PCM Mecanico v1.0.0 (Build ${{ github.run_number }})
          body: |
            ## App Mecanico Industrial - PCM
            APK para instalacao direta em dispositivos Android 6.0+
            ### Como instalar:
            1. Baixe o arquivo pcm-mecanico.apk abaixo
            2. No celular, permita instalacao de fontes desconhecidas
            3. Instale o APK
            4. Abra o app e escaneie o QR Code de vinculacao
            **Build automatico #${{ github.run_number }}**
          files: mecanico-app/output/pcm-mecanico.apk
          draft: false
