name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'mecanico-app/**'
      - '.github/workflows/build-apk.yml'
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (release)
        working-directory: mecanico-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename and prepare APK
        run: |
          mkdir -p mecanico-app/output
          cp mecanico-app/android/app/build/outputs/apk/release/app-release.apk mecanico-app/output/pcm-mecanico.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcm-mecanico-apk
          path: mecanico-app/output/pcm-mecanico.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: PCM Mecanico v1.0.0 (Build ${{ github.run_number }})
          body: |
            ## App Mecanico Industrial - PCM
            APK para instalacao direta em dispositivos Android 6.0+
            **Build automatico #${{ github.run_number }}**
          files: mecanico-app/output/pcm-mecanico.apk
          draft: false
