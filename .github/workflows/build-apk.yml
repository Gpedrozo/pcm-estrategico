name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'mecanico-app/**'
      - '.github/workflows/build-apk.yml'
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mecanico-app/package-lock.json

      - name: Install JS dependencies
        working-directory: mecanico-app
        run: npm ci --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Verify environment
        working-directory: mecanico-app
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== Java version ==="
          java -version
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== node_modules check ==="
          ls node_modules/react-native/package.json 2>/dev/null && echo "react-native OK" || echo "react-native MISSING"
          ls node_modules/expo/package.json 2>/dev/null && echo "expo OK" || echo "expo MISSING"
          ls node_modules/@expo/cli/package.json 2>/dev/null && echo "@expo/cli OK" || echo "@expo/cli MISSING"
          echo "=== android dir check ==="
          ls android/gradlew && echo "gradlew OK" || echo "gradlew MISSING"

      - name: Build APK (release)
        working-directory: mecanico-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "::group::Gradle full output (last 200 lines)"
            tail -200 /tmp/gradle-output.txt
            echo "::endgroup::"
            echo "::error::Gradle build failed with exit code $RESULT"
            exit $RESULT
          fi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: /tmp/gradle-output.txt
          retention-days: 7

      - name: Rename and prepare APK
        run: |
          mkdir -p mecanico-app/output
          cp mecanico-app/android/app/build/outputs/apk/release/app-release.apk mecanico-app/output/pcm-mecanico.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcm-mecanico-apk
          path: mecanico-app/output/pcm-mecanico.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: PCM Mecanico v1.0.0 (Build ${{ github.run_number }})
          body: |
            ## App Mecanico Industrial - PCM
            APK para instalacao direta em dispositivos Android 6.0+
            **Build automatico #${{ github.run_number }}**
          files: mecanico-app/output/pcm-mecanico.apk
          draft: false
